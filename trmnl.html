<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="1800">
  <title>Pollenflug – TRMNL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
      padding: 12px;
      max-width: 800px;
    }

    .error {
      font-size: 1.1rem;
      padding: 2rem;
      text-align: center;
    }

    /* Allergy risk summary */
    .risk-box {
      border: 2px solid #000;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .risk-header {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .risk-meter {
      height: 14px;
      background: #e0e0e0;
      border: 1px solid #000;
      margin-bottom: 8px;
    }

    .risk-meter-fill {
      height: 100%;
      background: #000;
    }

    .risk-values {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.85rem;
    }

    .risk-day strong {
      font-weight: 700;
    }

    /* Hourly chart (monochrome, e-ink friendly) */
    .hourly-chart {
      margin-bottom: 8px;
    }

    .hourly-plot {
      display: flex;
      align-items: stretch;
      gap: 3px;
    }

    .hourly-yaxis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 14px;
      height: 56px;
      font-size: 0.65rem;
      color: #000;
      text-align: right;
      line-height: 1;
    }

    .hourly-yaxis span:last-child {
      transform: translateY(100%);
    }

    .hourly-bars {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 56px;
      border-bottom: 1px solid #000;
      padding: 0 1px;
      background-image: linear-gradient(to bottom, transparent calc(50% - 1px), #bbb calc(50% - 1px), #bbb 50%, transparent 50%);
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }

    .hourly-bar-fill {
      position: relative;
      z-index: 1;
    }

    .hourly-bar {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: flex-end;
    }

    .hourly-bar-fill {
      width: 100%;
      background: #000;
      min-height: 1px;
    }

    .hourly-bar.is-now .hourly-bar-fill {
      outline: 1px solid #000;
      outline-offset: 1px;
    }

    .hourly-axis {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      padding: 2px 0 0 calc(14px + 3px + 1px);
    }

    /* Allergen table */
    .allergen-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .allergen-table th {
      text-align: center;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 4px 6px 6px;
      border-bottom: 2px solid #000;
      color: #333;
    }

    .allergen-table th:first-child {
      text-align: left;
    }

    .allergen-table td {
      padding: 7px 6px;
      border-bottom: 1px solid #ccc;
      text-align: center;
      vertical-align: middle;
    }

    .allergen-table td:first-child {
      text-align: left;
    }

    .allergen-table tr:last-child td {
      border-bottom: none;
    }

    .allergen-name-cell {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .allergen-latin-cell {
      font-size: 0.7rem;
      font-style: italic;
      color: #666;
    }

    /* Level indicators */
    .level-pip {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #000;
      line-height: 22px;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
    }

    .pip-0 { background: #fff; color: #999; border-color: #ccc; }
    .pip-1 { background: #ddd; color: #000; }
    .pip-2 { background: #999; color: #fff; }
    .pip-3 { background: #444; color: #fff; }
    .pip-4 { background: #000; color: #fff; }

    .no-data {
      text-align: center;
      padding: 2rem;
      font-size: 1rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="no-data">Lade Pollendaten…</div>
  </div>

  <script>
    const POLLEN_PROXY_URL = 'https://pollen-trmnl.pollenapp-trmnl.workers.dev/api/pollen-by-zip';
    const DAY_LABELS = ['Heute', 'Morgen', 'Überm.', 'In 3 T.'];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const zip = params.get('zip') || params.get('ZIP') || params.get('plz') || params.get('PLZ');

      if (!zip) {
        showError('Keine PLZ angegeben. Nutzung: ?zip=1150');
        return;
      }

      try {
        const data = await fetchPollen(zip);
        render(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function fetchPollen(zip) {
      const res = await fetch(`${POLLEN_PROXY_URL}?zip=${zip}`);
      if (!res.ok) throw new Error(`API-Fehler: HTTP ${res.status}`);
      return await res.json();
    }

    function render(data) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      // Allergy risk box
      const risk = data.allergyrisk || {};
      const hourly = data.allergyrisk_hourly && data.allergyrisk_hourly.allergyrisk_hourly_1;
      if (risk.allergyrisk_1 != null) {
        const riskBox = document.createElement('div');
        riskBox.className = 'risk-box';

        const summary = `
          <div class="risk-values">
            ${[risk.allergyrisk_1, risk.allergyrisk_2, risk.allergyrisk_3, risk.allergyrisk_4]
              .map((v, i) => `<span class="risk-day">${DAY_LABELS[i]}: <strong>${v ?? '–'}</strong>/10</span>`)
              .join('')}
          </div>`;

        if (Array.isArray(hourly) && hourly.length === 24) {
          const currentHour = new Date().getHours();
          const peak = Math.max(...hourly);
          const peakHour = hourly.indexOf(peak);
          const bars = hourly.map((v, h) => {
            const heightPct = Math.max(v * 10, v > 0 ? 4 : 0);
            const cls = h === currentHour ? 'hourly-bar is-now' : 'hourly-bar';
            return `<div class="${cls}" title="${h}:00 – ${v}/10">
              <div class="hourly-bar-fill" style="height:${heightPct}%"></div>
            </div>`;
          }).join('');
          riskBox.innerHTML = `
            <div class="risk-header">Allergierisiko heute — Höchstwert ${peak}/10 um ${peakHour}:00</div>
            <div class="hourly-chart">
              <div class="hourly-plot">
                <div class="hourly-yaxis"><span>10</span><span>0</span></div>
                <div class="hourly-bars">${bars}</div>
              </div>
              <div class="hourly-axis"><span>0</span><span>6</span><span>12</span><span>18</span><span>24</span></div>
            </div>
            ${summary}`;
        } else {
          const riskToday = risk.allergyrisk_1;
          riskBox.innerHTML = `
            <div class="risk-header">Allergierisiko heute: ${riskToday}/10</div>
            <div class="risk-meter">
              <div class="risk-meter-fill" style="width:${riskToday * 10}%"></div>
            </div>
            ${summary}`;
        }
        content.appendChild(riskBox);
      }

      // Process allergens: filter out "keine" (level 0 on all days), sort strongest first
      const allergens = (data.contamination || [])
        .map(item => {
          const levels = [
            item.contamination_1 ?? 0,
            item.contamination_2 ?? 0,
            item.contamination_3 ?? 0,
            item.contamination_4 ?? 0,
          ];
          const titleMatch = item.poll_title.match(/^(.+?)\s*\((.+)\)$/);
          return {
            name: titleMatch ? titleMatch[1].trim() : item.poll_title,
            latin: titleMatch ? titleMatch[2].trim() : '',
            levels,
            maxLevel: Math.max(...levels),
          };
        })
        .filter(a => a.maxLevel > 0)
        .sort((a, b) => b.levels[0] - a.levels[0] || b.maxLevel - a.maxLevel);

      if (allergens.length === 0) {
        const noData = document.createElement('div');
        noData.className = 'no-data';
        noData.textContent = 'Derzeit keine Pollenbelastung.';
        content.appendChild(noData);
        return;
      }

      // Allergen table
      const table = document.createElement('table');
      table.className = 'allergen-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th></th>
            ${DAY_LABELS.map(l => `<th>${l}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${allergens.map(a => `
            <tr>
              <td>
                <div class="allergen-name-cell">${esc(a.name)}</div>
                ${a.latin ? `<div class="allergen-latin-cell">${esc(a.latin)}</div>` : ''}
              </td>
              ${a.levels.map(l => `<td><span class="level-pip pip-${l}">${l}</span></td>`).join('')}
            </tr>
          `).join('')}
        </tbody>`;
      content.appendChild(table);
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `<div class="error">${esc(msg)}</div>`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
